services:
  keycloak-db:
    image: postgres:15-alpine
    container_name: hypesoft_keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - hypesoft_network

  mongodb:
    image: mongo:7.0-jammy
    container_name: hypesoft_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    ports:
      - "8081:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hypesoft_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: hypesoft_keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - hypesoft_network
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypesoft_backend
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    depends_on:
      - keycloak
      - mongodb
    networks:
      - hypesoft_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hypesoft_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
       - ./frontend:/app
       - /app/node_modules
    restart: unless-stopped
    networks:
      - hypesoft_network


networks:
  hypesoft_network:
    driver: bridge

volumes:
  keycloak_data:
  mongodb_data:
